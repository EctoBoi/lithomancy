<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lithomancy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #e8d8c0;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      margin-top: 18px;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #c8a96e;
      text-shadow: 0 0 18px #c8a96e88;
    }
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 60px;
    }
    #lobby button {
      padding: 12px 36px;
      font-size: 1.1rem;
      font-family: inherit;
      background: #1e1a30;
      color: #c8a96e;
      border: 2px solid #c8a96e;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s;
    }
    #lobby button:hover { background: #2e2840; }
    #lobby input {
      padding: 10px 18px;
      font-size: 1.1rem;
      font-family: inherit;
      background: #1e1a30;
      color: #e8d8c0;
      border: 2px solid #6060a0;
      border-radius: 6px;
      text-align: center;
      width: 200px;
      letter-spacing: 0.2em;
    }
    #lobby .sep { color: #604080; font-size: 0.85rem; }
    #code-display {
      font-size: 2rem;
      letter-spacing: 0.3em;
      color: #a0c8ff;
      text-shadow: 0 0 14px #a0c8ff88;
    }
    #status-bar {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #9080b0;
      min-height: 1.4em;
    }
    canvas {
      display: block;
      margin-top: 8px;
      border: 2px solid #302850;
      border-radius: 12px;
    }
    #ui-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      min-height: 80px;
    }
    #ui-panel button {
      padding: 10px 28px;
      font-family: inherit;
      font-size: 1rem;
      background: #1e1a30;
      color: #c8a96e;
      border: 2px solid #c8a96e;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    #ui-panel button:hover { background: #2e2840; }
    #ui-panel button:disabled { opacity: 0.35; cursor: default; }
    #ui-panel .row { display: flex; gap: 10px; }
    #outcome-banner {
      font-size: 1.4rem;
      color: #ffe080;
      text-shadow: 0 0 12px #ffe08099;
      min-height: 2em;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>✦ LITHOMANCY ✦</h1>
  <div id="status-bar">Connecting…</div>

  <div id="lobby">
    <button id="btn-create">Create Room</button>
    <div class="sep">— or join with a code —</div>
    <input id="join-input" type="text" maxlength="6" placeholder="XXXXXX" />
    <button id="btn-join">Join Room</button>
  </div>

  <div id="code-display"></div>

  <canvas id="canvas" width="640" height="640" style="display:none"></canvas>

  <div id="outcome-banner"></div>
  <div id="ui-panel"></div>

  <script type="module" src="/js/client/client.js"></script>
</body>
</html>
